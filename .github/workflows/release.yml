name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: swift test

      - name: Build release binary
        run: swift build -c release

      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Package archive
        run: |
          cp .build/release/AtticCLI attic
          tar czf "attic-${VERSION}-aarch64-apple-darwin.tar.gz" attic

      - name: Generate checksum
        run: |
          shasum -a 256 attic-"${VERSION}"-*.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --generate-notes \
            "attic-${VERSION}-aarch64-apple-darwin.tar.gz" \
            checksums.txt
