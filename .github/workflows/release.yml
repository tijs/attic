name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          deno-version: v2.x

      - name: Run tests
        run: deno task test

      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Compile binaries
        run: |
          deno compile -A --target aarch64-apple-darwin --output attic-aarch64-apple-darwin cli/mod.ts
          deno compile -A --target x86_64-apple-darwin --output attic-x86_64-apple-darwin cli/mod.ts

      - name: Package archives
        run: |
          tar czf "attic-${VERSION}-aarch64-apple-darwin.tar.gz" attic-aarch64-apple-darwin
          tar czf "attic-${VERSION}-x86_64-apple-darwin.tar.gz" attic-x86_64-apple-darwin

      - name: Generate checksums
        run: |
          shasum -a 256 attic-"${VERSION}"-*.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --generate-notes \
            "attic-${VERSION}-aarch64-apple-darwin.tar.gz" \
            "attic-${VERSION}-x86_64-apple-darwin.tar.gz" \
            checksums.txt
