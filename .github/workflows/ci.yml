name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        run: brew install swiftlint swiftformat

      - name: SwiftLint
        run: swiftlint lint --quiet

      - name: SwiftFormat check
        run: swiftformat --lint .

  test:
    needs: lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Run tests
        run: swift test
